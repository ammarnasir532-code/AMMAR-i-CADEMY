<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMMAR-AI OMNI | الإصدار النهائي الخارق</title>
    <style>
        :root {
            --gold: #d4af37;
            --space-black: #05070a;
            --neon-blue: #00f2ff;
            --text-gray: #e0e0e0;
            --danger: #ff4d4d;
        }

        body {
            background-color: var(--space-black);
            color: var(--text-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* سجل المحادثات الجانبي */
        #sidebar {
            width: 280px;
            background: #0a0e14;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            color: var(--gold);
            font-size: 1.2em;
            font-weight: bold;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }

        .history-item:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        /* منطقة المحتوى الرئيسية */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #0f141a, #05070a);
        }

        header {
            padding: 15px;
            background: #000;
            border-bottom: 2px solid var(--gold);
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
        }

        .logo {
            font-size: 1.8em;
            color: var(--gold);
            letter-spacing: 3px;
            margin: 0;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        #mode-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .mode-btn {
            padding: 6px 20px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--gold);
            color: #000;
        }

        /* نافذة الدردشة */
        #chat-window {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 85%;
            padding: 15px;
            border-radius: 15px;
            line-height: 1.6;
            position: relative;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai {
            background: rgba(0, 212, 255, 0.07);
            border-right: 4px solid var(--neon-blue);
            align-self: flex-start;
        }

        .user {
            background: rgba(212, 175, 55, 0.07);
            border-left: 4px solid var(--gold);
            align-self: flex-end;
            margin-left: auto;
        }

        /* منطقة الإدخال والأزرار */
        #input-container {
            padding: 20px;
            background: #0a0e14;
            border-top: 1px solid #222;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid #444;
            background: #000;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .action-btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #send-btn { background: var(--gold); color: black; }
        #predict-btn { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        #export-btn { background: transparent; border: 1px solid #555; color: #aaa; }

        .file-upload {
            background: #222;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">AMMAR //i\\cademy</div>
    <div id="history-list">
        </div>
    <button onclick="clearHistory()" style="background:transparent; color:var(--danger); border:none; cursor:pointer; margin-top:10px; font-size: 0.8em;">🗑️ مسح كل البيانات</button>
</aside>

<main id="main-content">
    <header>
        <h1 class="logo">AMMAR-AI OMNI</h1>
        <div id="mode-selector">
            <button id="med-mode" class="mode-btn active" onclick="switchMode('medical')">القسم الطبي الطوري</button>
            <button id="gen-mode" class="mode-btn" onclick="switchMode('general')">القسم العام العالمي</button>
        </div>
    </header>

    <div id="chat-window">
        <div class="msg ai" id="system-status">جاري تفعيل بروتوكول الشبح المعلوماتي... متصل بالإنترنت عبر عقد IPFS. الحالة: غير قابل للحجب.</div>
    </div>

    <div id="input-container">
        <div class="input-wrapper">
            <label class="file-upload" title="رفع ملف طبي للتحليل">
                📷 <input type="file" id="fileInput" hidden onchange="handleFileUpload(event)">
            </label>
            <input type="text" id="userInput" placeholder="اسأل الخوارزمية الخارقة عن أي شيء...">
            <button id="predict-btn" class="action-btn" onclick="runPrediction()">تنبؤ المستقبل</button>
            <button id="send-btn" class="action-btn" onclick="processInput()">تحليل</button>
            <button id="export-btn" class="action-btn" onclick="exportReport()">تصدير PDF</button>
        </div>
    </div>
</main>

<script>
    let currentMode = 'medical';
    let history = JSON.parse(localStorage.getItem('ammar_ai_history')) || [];

    // تبديل الأنماط
    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('med-mode').classList.toggle('active', mode === 'medical');
        document.getElementById('gen-mode').classList.toggle('active', mode === 'general');
        addMessage('ai', `تم الانتقال إلى [${mode === 'medical' ? 'القسم الطبي' : 'القسم العام'}]. الخوارزمية الآن في طور الرنين مع التردد المطلوب.`);
    }

    // معالجة الإرسال
    function processInput() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage('user', text);
        addToHistory(text);
        input.value = '';

        // رد الخوارزمية بناءً على القسم
        setTimeout(() => {
            let response = "";
            if (currentMode === 'medical') {
                response = `🔍 <b>التحليل الطوري الطبي:</b> تم استلام البيانات المعلوماتية لـ (${text}). بناءً على معادلات عمار، يُنصح بإعادة ضبط الاتزان الأيوني عبر إكسير الحياة (الماء المبرمج).`;
            } else {
                response = `🌍 <b>المعرفة العامة:</b> من خلال تدفق المعلومات العالمي، نجد أن سؤالك حول "${text}" يتبع نمطاً كونياً ثابتاً. الجواب يكمن في بزوغ الطور المعلوماتي لهذه الظاهرة.`;
            }
            addMessage('ai', response);
        }, 1000);
    }

    // تنبؤ المستقبل
    function runPrediction() {
        addMessage('user', "اطلب التنبؤ بالمسار الزمني الحيوي لـ 10 سنوات.");
        setTimeout(() => {
            const predHtml = `
                <div style="background: rgba(0,242,255,0.05); padding: 15px; border-radius: 10px; border: 1px dashed var(--neon-blue);">
                    <h4 style="color:var(--gold); margin:0 0 10px 0;">🔮 رؤية عمار للمستقبل (2026-2036)</h4>
                    <p>• <b>المدى القريب:</b> استقرار كامل في وظائف الكلى والكبد.</p>
                    <p>• <b>تنبيه طوري:</b> ضرورة شحن الماء بالنحاس في عام 2029 لتفادي انخفاض طاقة الخلية.</p>
                    <p>• <b>المحصلة:</b> تراجع العمر البيولوجي للبشرة بمقدار 12 عاماً بحلول 2035.</p>
                </div>`;
            addMessage('ai', predHtml);
        }, 1500);
    }

    // رفع الملفات
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (file) {
            addMessage('user', `تم رفع ملف للتحليل: ${file.name}`);
            setTimeout(() => {
                addMessage('ai', `⚡ <b>جاري المسح الضوئي للطور...</b> تم العثور على أنماط غير منتظمة في الصورة. الخوارزمية تقترح بروتوكول الشحن الفوتوني (الزجاج الأزرق) فوراً.`);
            }, 1200);
        }
    }

    // تصدير التقرير
    function exportReport() {
        const chatContent = document.getElementById('chat-window').innerText;
        const blob = new Blob([`وثيقة رسمية من AMMAR //i\\cademy\n\nتقرير الحالة المعلوماتية والطبية:\n${chatContent}`], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `AMMAR_AI_REPORT_${new Date().toISOString().slice(0,10)}.txt`;
        link.click();
    }

    // إدارة السجل والرسائل
    function addMessage(type, text) {
        const chatWindow = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addToHistory(text) {
        history.unshift(text);
        if (history.length > 20) history.pop();
        localStorage.setItem('ammar_ai_history', JSON.stringify(history));
        updateHistorySidebar();
    }

    function updateHistorySidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = history.map(item => `<div class="history-item">${item}</div>`).join('');
    }

    function clearHistory() {
        localStorage.removeItem('ammar_ai_history');
        history = [];
        updateHistorySidebar();
        location.reload();
    }

    // تحميل السجل عند البداية
    updateHistorySidebar();
</script>

</body>
</html>
