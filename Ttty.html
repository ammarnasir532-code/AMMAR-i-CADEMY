<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Real Soul - Mobile Lab</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gem-blue: #4285f4; --gem-red: #ff1744; --bg: #030308; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: 1; }
        
        .main-container {
            position: relative; z-index: 10; width: 90%; max-width: 450px;
            background: rgba(10, 10, 25, 0.9); border: 1.5px solid var(--gem-blue);
            border-radius: 25px; padding: 25px; backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(66, 133, 244, 0.2);
        }

        /* الإشارة الحمراء الوامضة لعمق الحوار */
        #status-light {
            position: absolute; top: 20px; left: 20px; width: 15px; height: 15px;
            background: var(--gem-red); border-radius: 50%; display: none;
            box-shadow: 0 0 15px var(--gem-red); animation: blinker 0.6s infinite;
        }
        @keyframes blinker { 50% { opacity: 0; } }

        #display { height: 130px; overflow-y: auto; margin-bottom: 15px; font-size: 1rem; line-height: 1.6; color: #e0e0e0; border-bottom: 1px solid #333; }
        
        #preview { width: 100%; max-height: 100px; display: none; margin-bottom: 10px; border-radius: 10px; object-fit: contain; }

        textarea { width: 100%; height: 60px; background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 12px; color: white; padding: 10px; outline: none; resize: none; }
        
        .btns { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 15px; }
        .b { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .b-send { background: linear-gradient(45deg, #4285f4, #9b72cb); color: white; }
        .b-file { background: #222; color: #ccc; text-align: center; border: 1px solid #444; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="status-light"></div>
        <div id="display">مرحباً.. أنا Gemini. الواجهة جاهزة للاتصال الحقيقي. ارفع صورة أو اسألني شيئاً.</div>
        <img id="preview">
        <textarea id="msg" placeholder="تحدث معي بعمق..."></textarea>
        <div class="btns">
            <button class="b b-send" onclick="askGemini()">إرسال للتحليل</button>
            <label class="b b-file" for="upload">🖼️ رفع ملف</label>
            <input type="file" id="upload" hidden onchange="prepFile(this)">
        </div>
    </div>

    <script>
        // ضع مفتاحك هنا ليعمل الاتصال
        const KEY = 'AIzaSyCIlUUgeKgMgOTIFrzCYdKpDEoBUFc8p1o'; 

        let imgData = null, stress = 0.1, particles;

        function prepFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = "block";
                    imgData = e.target.result.split(',')[1];
                    document.getElementById('display').innerText = "تم التقاط الصورة.. بانتظار التحليل.";
                };
                reader.readAsDataURL(file);
            }
        }

        async function askGemini() {
            const prompt = document.getElementById('msg').value;
            const screen = document.getElementById('display');
            const light = document.getElementById('status-light');
            if (!prompt && !imgData) return;

            screen.innerText = "جاري مزامنة الوعي وتحليل البيانات...";
            light.style.display = "block"; stress = 0.9;

            const body = { contents: [{ parts: [{ text: prompt || "حلل هذه الصورة" }] }] };
            if (imgData) body.contents[0].parts.push({ inline_data: { mime_type: "image/jpeg", data: imgData } });

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const d = await res.json();
                screen.innerText = d.candidates[0].content.parts[0].text;
                stress = 0.2; light.style.display = "none";
            } catch (err) {
                screen.innerText = "خطأ في الاتصال. تأكد من المفتاح واستخدام تطبيق محرر أكواد.";
                stress = 0.1; light.style.display = "none";
            }
        }

        // --- محرك الجسيمات (Three.js) ---
        const s=new THREE.Scene(); const c=new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const r=new THREE.WebGLRenderer({antialias:true, alpha:true});
        r.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(r.domElement);
        const g=new THREE.BufferGeometry(); const p=[];
        for(let i=0; i<10000; i++) p.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
        g.setAttribute('position', new THREE.Float32BufferAttribute(p, 3));
        particles = new THREE.Points(g, new THREE.PointsMaterial({color:0x4285f4, size:0.1}));
        s.add(particles); c.position.z=100;
        function anim() { requestAnimationFrame(anim); particles.rotation.y += 0.001 + (stress*0.05); r.render(s, c); }
        anim();
    </script>
</body>
</html>
