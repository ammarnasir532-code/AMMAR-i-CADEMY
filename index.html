<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMMAR//i\\CADEMY</title>
    <!-- Puter.js (for AI) -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e6;
            color: #1e1e2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            border: none;
            display: flex;
            flex-direction: column;
        }

        .brand {
            text-align: center;
            margin: 8px auto 5px auto;
        }
        .brand .gold {
            color: #FFD700;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .brand .sub {
            color: #4a4a6a;
            font-size: 0.7rem;
            font-weight: 400;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            margin-top: 2px;
        }

        header {
            text-align: center;
            flex-shrink: 0;
            margin-bottom: 0;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1 1 95vh;
            overflow-y: auto;
            padding: 20px;
            min-height: 0;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message.system {
            align-items: center;
        }

        .message .content {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 18px;
            background: #f0f0fa;
            color: #1e1e2e;
            font-size: 0.95em;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .message.user .content {
            background: #89b4fa;
            color: #1e1e2e;
        }

        .message.assistant .content {
            background: #a6e3a1;
            color: #1e1e2e;
        }

        .message.system .content {
            background: #f9e2af;
            color: #1e1e2e;
        }

        .message .time {
            font-size: 0.65em;
            color: #4a4a6a;
            margin-top: 5px;
        }

        .input-area {
            background: rgba(255, 255, 255, 0.5);
            padding: 10px 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.5);
            backdrop-filter: blur(4px);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-row textarea {
            flex: 1;
            padding: 8px 16px;
            border-radius: 25px;
            border: 2px solid gold;
            background: white;
            color: #1e1e2e;
            font-size: 0.95em;
            resize: none;
            font-family: inherit;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05), 0 2px 5px rgba(255,215,0,0.2);
            height: 2cm;
            min-height: 2cm;
        }

        .circle-send {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            border: 2px solid gold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            color: #2d2d3a;
            flex-shrink: 0;
        }

        .circle-send:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }

        /* الصف الموحد للأيقونات الصغيرة والقائمة */
        .compact-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 5px;
        }

        /* أيقونة المشبك صغيرة سوداء */
        .upload-icon-small {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: black;
            transition: 0.2s;
            padding: 0 5px;
        }
        .upload-icon-small:hover {
            color: gold;
        }

        /* أزرار DeepThink و Search أصغر */
        .small-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid gold;
            border-radius: 40px;
            padding: 5px 15px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e1e2e;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        .small-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }

        .small-btn.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffaa00;
        }

        /* قائمة اختيار النموذج بنفس المستوى */
        .model-selector select {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid gold;
            background: white;
            color: #1e1e2e;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .hidden-check {
            display: none;
        }

        .image-result {
            margin-top: 10px;
            text-align: center;
        }

        .image-result img {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 2px solid gold;
        }

        footer {
            text-align: center;
            margin-top: 5px;
            color: #4a4a6a;
            font-size: 0.7rem;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            padding-top: 5px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <div class="gold">AMMAR//i\\CADEMY</div>
                <div class="sub">Ammar Nasir Hussein al-mantafji 2026</div>
            </div>
        </header>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message system">
                    <div class="content">Welcome to the infinite space! I work without any API keys. Try sending a message or request an image.</div>
                </div>
            </div>

            <div class="input-area">
                <input type="checkbox" id="voiceOutput" class="hidden-check">
                <input type="checkbox" id="imageMode" class="hidden-check">
                <input type="checkbox" id="internetSearch" class="hidden-check">

                <div class="input-row">
                    <textarea id="userInput" placeholder="Type your message here..." rows="2"></textarea>
                    <button class="circle-send" id="sendBtn">✨</button>
                </div>

                <!-- الصف الموحد: مشبك صغير + أزرار صغيرة + قائمة النماذج -->
                <div class="compact-row">
                    <button class="upload-icon-small" id="uploadBtn" title="Upload image">📎</button>
                    <button class="small-btn" id="deepThinkBtn">DeepThink</button>
                    <button class="small-btn" id="searchBtn">Search</button>
                    <div class="model-selector">
                        <select id="modelSelect">
                            <option value="gpt-5-nano">GPT-5 Nano (fast)</option>
                            <option value="claude-opus-4">Claude Opus 4 (smart)</option>
                            <option value="gemini-2.0-pro">Gemini 2.0 Pro</option>
                            <option value="deepseek-r1" selected>DeepSeek R1 (precise)</option>
                        </select>
                    </div>
                </div>

                <input type="file" id="fileInput" accept="image/*" style="display: none;">

                <div class="image-result" id="imageResult"></div>
            </div>
        </div>

        <footer>
            ⚡ No API keys required • powered by Puter.js + Pollinations.ai • to infinity ✨
        </footer>
    </div>

    <script>
        // DOM elements
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceOutput = document.getElementById('voiceOutput');
        const imageMode = document.getElementById('imageMode');
        const internetSearch = document.getElementById('internetSearch');
        const modelSelect = document.getElementById('modelSelect');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const imageResult = document.getElementById('imageResult');
        const deepThinkBtn = document.getElementById('deepThinkBtn');
        const searchBtn = document.getElementById('searchBtn');

        let deepThinkActive = false;
        let searchActive = false;

        deepThinkBtn.addEventListener('click', () => {
            deepThinkActive = !deepThinkActive;
            if (deepThinkActive) {
                modelSelect.value = 'deepseek-r1';
                deepThinkBtn.classList.add('active');
            } else {
                modelSelect.value = 'gpt-5-nano';
                deepThinkBtn.classList.remove('active');
            }
        });

        searchBtn.addEventListener('click', () => {
            searchActive = !searchActive;
            internetSearch.checked = searchActive;
            if (searchActive) {
                searchBtn.classList.add('active');
            } else {
                searchBtn.classList.remove('active');
            }
        });

        uploadBtn.addEventListener('click', () => fileInput.click());

        function addMessage(role, content, isHtml = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            if (isHtml) {
                contentDiv.innerHTML = content;
            } else {
                contentDiv.textContent = content;
            }
            msgDiv.appendChild(contentDiv);
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            const now = new Date();
            timeSpan.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            msgDiv.appendChild(timeSpan);
            
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            if (role === 'assistant' && voiceOutput.checked) {
                speakText(content);
            }
        }

        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1;
            utterance.pitch = 1;
            speechSynthesis.speak(utterance);
        }

        async function generateImage(prompt) {
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}`;
            imageResult.innerHTML = `<img src="${imgUrl}" alt="${prompt}" onload="this.style.opacity=1">`;
            return imgUrl;
        }

        async function chatWithAI(message) {
            try {
                const options = {
                    model: modelSelect.value,
                    max_tokens: 1000
                };
                if (modelSelect.value !== 'deepseek-r1') {
                    options.temperature = 0.7;
                }
                const response = await puter.ai.chat(message, options);
                return response;
            } catch (error) {
                console.error('Puter.ai error:', error);
                throw error;
            }
        }

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                const imageData = event.target.result;
                addMessage('user', '📷 [Image uploaded]');

                try {
                    const response = await puter.ai.chat(
                        "Analyze this image in detail, tell me what you see.",
                        imageData,
                        { model: modelSelect.value }
                    );
                    addMessage('assistant', response);
                } catch (error) {
                    addMessage('system', `❌ Error analyzing image: ${error.message}`);
                }
            };
            reader.readAsDataURL(file);
        });

        sendBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (!text && !imageMode.checked) return;

            if (imageMode.checked) {
                addMessage('user', `🖼️ Generate image: ${text}`);
                userInput.value = '';
                
                try {
                    const imgUrl = await generateImage(text);
                    addMessage('assistant', `Image generated:`, true);
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message assistant';
                    msgDiv.innerHTML = `<div class="content"><img src="${imgUrl}" style="max-width:100%; border-radius:10px;"></div>`;
                    chatMessages.appendChild(msgDiv);
                } catch (error) {
                    addMessage('system', `❌ Error generating image: ${error.message}`);
                }
            } else {
                addMessage('user', text);
                userInput.value = '';
                
                try {
                    let finalText = text;
                    if (internetSearch.checked) {
                        finalText = text + " (please include up-to-date information from the internet if possible)";
                    }
                    const response = await chatWithAI(finalText);
                    addMessage('assistant', response);
                } catch (error) {
                    addMessage('system', `❌ Connection error: ${error.message}`);
                }
            }
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                sendBtn.click();
            }
        });

        addMessage('system', '👋 I work without any API keys! Use Puter.ai for text and Pollinations.ai for images.');
    </script>
</body>
</html>
