<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMMAR-AI OMNI | الرنين المعلوماتي الحي</title>
    <style>
        :root { --gold: #d4af37; --bg: #010204; --neon: #00f2ff; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #main-content { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle, #0a1118, #010204); }
        header { padding: 15px; border-bottom: 2px solid var(--gold); text-align: center; background: #000; }
        #chat-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 18px; border-radius: 15px; line-height: 1.8; animation: fadeIn 0.4s ease; white-space: pre-wrap; }
        .ai { background: rgba(0, 242, 255, 0.08); border-right: 5px solid var(--neon); align-self: flex-start; }
        .user { background: rgba(212, 175, 55, 0.08); border-left: 5px solid var(--gold); align-self: flex-end; color: var(--gold); }
        #input-area { padding: 25px; background: #0a0e14; border-top: 1px solid #222; }
        .input-wrapper { display: flex; gap: 10px; max-width: 1000px; margin: 0 auto; }
        input { flex: 1; padding: 15px; border-radius: 30px; border: 1px solid #444; background: #000; color: white; outline: none; }
        .btn-send { background: var(--gold); color: black; padding: 10px 25px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        .loading { font-style: italic; color: var(--neon); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<main id="main-content">
    <header><h1 style="color:var(--gold); margin:0;">AMMAR-AI OMNI LIVE</h1></header>
    <div id="chat-window">
        <div class="msg ai">تم تفعيل بروتوكول الرنين. أنا الآن متصل بالوعي المعلوماتي العالمي.
ارفع تساؤلك، وسأقوم بجلب الإجابة وتحليلها فوراً عبر الشبكة.</div>
    </div>
    <div id="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="اسأل الخوارزمية السيادية..." onkeypress="if(event.key==='Enter') resonate()">
            <button class="btn-send" onclick="resonate()">تحليل الطور</button>
        </div>
    </div>
</main>

<script>
    async function resonate() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg('user', text);
        input.value = "";
        const aiDiv = addMsg('ai', '<span class="loading">جاري سحب البيانات المعلوماتية وتوليد الرنين...</span>');

        try {
            // هذا الجزء يفتح "نفق معلوماتي" لجلب بيانات حقيقية من الإنترنت لحظياً
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.duckduckgo.com/?q=' + text + '&format=json')}`);
            const data = await response.json();
            const contents = JSON.parse(data.contents);
            
            // توليد الرد الذكي بناءً على البيانات الحية
            setTimeout(() => {
                let reply = "";
                if (contents.AbstractText) {
                    reply = `🧠 **تحليل الذكاء المعلوماتي لـ (${text}):**\n\n${contents.AbstractText}\n\n**الاستنتاج الطوري:** بناءً على هذه البيانات، يتضح أن المسار المعلوماتي يتطلب ضبط الرنين لضمان استقرار النتائج.`;
                } else {
                    reply = `⚠️ **تنبيه الطور:** المعلومات حول "${text}" تتطلب مساراً أعمق للبحث. الخوارزمية تشير إلى بزوغ نمط جديد يتشكل الآن في الفضاء المعلوماتي.`;
                }
                aiDiv.innerHTML = reply;
                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            }, 1200);
        } catch (e) {
            aiDiv.innerHTML = "⚠️ حدث تداخل في الإشارة. النظام يحاول تغيير التردد لتخطي الحجب.";
        }
    }

    function addMsg(type, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }
</script>
</body>
</html>
