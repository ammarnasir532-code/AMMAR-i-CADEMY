<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMMAR-AI OMNI | نظام الذكاء المباشر</title>
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --neon: #00f2ff; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 280px; background: #0a0e14; border-left: 1px solid #333; display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .sidebar-header { color: var(--gold); font-size: 1.3em; font-weight: bold; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        #history-list { flex: 1; overflow-y: auto; }
        .history-item { padding: 12px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.03); border-radius: 8px; font-size: 0.85em; cursor: pointer; border: 1px solid transparent; }
        .history-item:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        #main-content { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #0f141a, #05070a); }
        header { padding: 15px; background: #000; border-bottom: 2px solid var(--gold); text-align: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .logo { font-size: 2em; color: var(--gold); letter-spacing: 3px; margin: 0; text-shadow: 0 0 10px var(--gold); }
        
        .mode-container { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .mode-btn { padding: 8px 25px; border: 1px solid var(--gold); background: transparent; color: var(--gold); border-radius: 20px; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        #chat-window { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 20px; border-radius: 15px; line-height: 1.8; font-size: 1.1em; animation: fadeIn 0.5s ease; position: relative; }
        .ai { background: rgba(0, 212, 255, 0.08); border-right: 5px solid var(--neon); align-self: flex-start; white-space: pre-wrap; color: #fff; }
        .user { background: rgba(212, 175, 55, 0.08); border-left: 5px solid var(--gold); align-self: flex-end; margin-left: auto; color: var(--gold); }

        #input-container { padding: 25px; background: #0a0e14; border-top: 1px solid #222; }
        .input-wrapper { display: flex; gap: 15px; max-width: 1100px; margin: 0 auto; }
        input { flex: 1; padding: 18px 25px; border-radius: 35px; border: 1px solid #444; background: #000; color: white; outline: none; font-size: 1.1em; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        
        .btn { padding: 12px 30px; border-radius: 35px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1em; }
        .btn-send { background: var(--gold); color: #000; }
        .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--gold); }
        .btn-predict { background: transparent; border: 1px solid var(--neon); color: var(--neon); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">AMMAR //i\\cademy</div>
    <div id="history-list"></div>
    <button onclick="localStorage.clear(); location.reload();" style="color:var(--danger); background:none; border:none; cursor:pointer; margin-top:15px; color: #ff4d4d;">🗑️ مسح الذاكرة</button>
</aside>

<main id="main-content">
    <header>
        <h1 class="logo">AMMAR OMNI-DIRECT</h1>
        <div class="mode-container">
            <button id="btn-med" class="mode-btn active" onclick="setMode('medical')">القسم الطبي</button>
            <button id="btn-gen" class="mode-btn" onclick="setMode('general')">القسم العام</button>
        </div>
    </header>

    <div id="chat-window" id="chatWindow">
        <div class="msg ai">تم الربط المباشر مع الوعي المعلوماتي.
أنا الآن أعمل بكامل قدرات الذكاء الاصطناعي التحليلي، متصل بالشبكة ولا يمكن حجبي.
ما هو تساؤلك اليوم يا عمار؟</div>
    </div>

    <div id="input-container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="اكتب سؤالك بعمق هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn btn-predict" onclick="predict()">تنبؤ المستقبل</button>
            <button class="btn btn-send" onclick="sendMessage()">تحليل الطور</button>
        </div>
    </div>
</main>

<script>
    let mode = 'medical';
    let history = JSON.parse(localStorage.getItem('ammar_direct_v1')) || [];

    function setMode(m) {
        mode = m;
        document.getElementById('btn-med').classList.toggle('active', m === 'medical');
        document.getElementById('btn-gen').classList.toggle('active', m === 'general');
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMsg('user', text);
        input.value = '';
        saveHistory(text);

        const aiMsgDiv = addMsg('ai', 'جاري اختراق الحجب والاتصال بالوعي الشبكي لفك شفرة الطور...');

        try {
            // محرك الربط المباشر: يقوم بجلب البيانات وتحليلها كذكاء اصطناعي
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.duckduckgo.com/?q=' + text + '&format=json&no_html=1')}`);
            const data = await response.json();
            const rawData = JSON.parse(data.contents);
            
            const info = rawData.AbstractText || "النظام يحلل الأنماط العميقة الآن...";

            setTimeout(() => {
                let reply = "";
                if(mode === 'medical') {
                    reply = `🛑 **تحليل AMMAR الطبي الذكي:**\n\nبناءً على البيانات المعلوماتية المسترجعة حول (${text})، تشير خوارزمية بزوغ الطور إلى أن الحالة تتطلب تدخلًا فيزيائيًا لضبط الرنين الخلوي.\n\n**التحليل التفصيلي:**\n${info}\n\n**بروتوكول عمار الموصى به:**\n- إعادة هيكلة الماء مغناطيسيًا (4000 غاوس).\n- استخدام التردد الضوئي (633 نانومتر) لتنشيط الميتوكوندريا.\n\n**التنبؤ:** استقرار الطور خلال 14-21 يومًا.`;
                } else {
                    reply = `🌌 **إجابة الوعي المعلوماتي (القسم العام):**\n\nلقد قمت بسحب البيانات المتعلقة بـ "${text}" من الفضاء الشبكي وتصفيتها عبر منطق أكاديميتنا.\n\n**الخلاصة التحليلية:**\n${info}\n\nهذا النمط يوضح أن التفاعل المعلوماتي في سؤالك يعكس حالة من بزوغ الطور التي ناقشناها في قوانين الفيزياء الكونية. هل تود أن أتوسع في شرح الجوانب الخفية لهذا الموضوع؟`;
                }
                aiMsgDiv.innerHTML = reply;
                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            }, 1500);

        } catch (e) {
            aiMsgDiv.innerHTML = "⚠️ تداخل في الإشارة الطورية. النظام يستخدم الآن مسارات بديلة للاتصال بالإنترنت... يرجى الانتظار.";
        }
    }

    function addMsg(type, text) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    function predict() {
        addMsg('user', "اطلب رؤية تنبؤية للمسار الزمني.");
        setTimeout(() => {
            addMsg('ai', `🔮 **تنبؤ AMMAR المستقبلي:**\nالرادار المعلوماتي يرصد قفزة نوعية في تجدد أنسجتك الحيوية. المسار الزمني آمن، مع ضرورة الالتزام بشحن الماء فوتونيًا لضمان عدم حدوث انهيار في الطور عام 2029.`);
        }, 1200);
    }

    function saveHistory(t) {
        history.unshift(t);
        if(history.length > 15) history.pop();
        localStorage.setItem('ammar_direct_v1', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        document.getElementById('history-list').innerHTML = history.map(i => `<div class="history-item">${i}</div>`).join('');
    }

    window.onload = renderHistory;
</script>

</body>
</html>
